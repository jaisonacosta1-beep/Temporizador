<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control de Advertencias y Temporizadores Activos</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --gold: #e6b800;
    --red: #d32f2f;
    --orange: #ff6b00;
    --dark: #050505;
    --card: #111;
    --success: #00ff88;
    --blue: #3b82f6;
    --info: #0dcaf0;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body { background: var(--dark); color: white; overflow-x: hidden; padding-bottom: 50px; }

header { background: rgba(0,0,0,0.95); padding: 15px 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; height: 70px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
.container { padding: 25px 15px; max-width: 1200px; margin: auto; }

.form-panel { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.input-group { margin-bottom: 15px; }
.input-group label { display: block; font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-family: 'Orbitron'; font-weight: bold; text-transform: uppercase; }
input, select, textarea { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #333; border-radius: 10px; font-size: 15px; }
input:focus, select:focus, textarea:focus { border-color: var(--gold); outline: none; }

.btn { padding: 14px; border: none; border-radius: 10px; font-family: 'Orbitron'; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
.btn-gold { background: var(--gold); color: black; }
.btn-blue { background: var(--blue); color: white; }
.btn-red { background: var(--red); color: white; }

.grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.driver-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; display: flex; flex-direction: column; justify-content: space-between; }
.driver-card.active-timer { border-color: var(--orange); box-shadow: 0 0 10px rgba(255,107,0,0.2); }

.badge { padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; font-family: 'Orbitron'; display: inline-block; margin-top: 5px; }
.bg-run { background: var(--orange); color: white; }
.bg-off { background: #333; color: #aaa; }

/* Vista del Chofer */
.chofer-container { max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
.timer-box { font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; margin: 25px 0; letter-spacing: 2px; }
.img-alerta { width: 100%; max-height: 350px; object-fit: contain; border-radius: 12px; margin-top: 20px; border: 1px solid #333; background: #000; }

.link-box { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; font-size: 0.8rem; color: var(--info); word-break: break-all; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
.copy-btn { background: none; border: none; color: var(--gold); cursor: pointer; padding-left: 10px; }
</style>
</head>
<body>

<div id="panel-admin" style="display: none;">
    <header>
        <div style="font-family:'Orbitron'; color:var(--gold); font-size:1.2rem;"><i class="fa-solid fa-clock"></i> PANEL DE TEMPORIZADORES</div>
        <div style="color: var(--success); font-size: 0.8rem; font-family: 'Orbitron';">SISTEMA SATÉLITE ACTIVO</div>
    </header>
    
    <div class="container">
        <div class="form-panel">
            <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:15px; font-size:1.1rem;">NUEVA ALERTA TEMPORIZADA</h2>
            <form id="form-alerta" onsubmit="activarAlerta(event)">
                <div class="input-group">
                    <label>Seleccionar Conductor</label>
                    <select id="select-chofer" required onchange="cargarAlertaExistente()"></select>
                </div>
                <div class="grid-layout" style="grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 0;">
                    <div class="input-group">
                        <label>Duración del Temporizador</label>
                        <input type="number" id="alerta-tiempo" placeholder="Ej: 30" required min="1">
                    </div>
                    <div class="input-group">
                        <label>Unidad de Tiempo</label>
                        <select id="alerta-unidad">
                            <option value="minutos">Minutos</option>
                            <option value="horas">Horas</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Color del Panel Visual</label>
                    <select id="alerta-color">
                        <option value="orange">Naranja (Advertencia Moderada)</option>
                        <option value="red">Rojo (Bloqueo / Alerta Crítica)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Motivo o Detalles de la Alerta</label>
                    <textarea id="alerta-motivo" rows="3" placeholder="Escribe la razón del temporizador (El chofer verá esto obligatoriamente)..." required></textarea>
                </div>
                <div class="input-group">
                    <label>Imagen Adjunta de Respaldo (Opcional)</label>
                    <input type="file" id="alerta-foto" accept="image/*">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-gold" id="btn-submit-alerta"><i class="fa-solid fa-bolt"></i> ACTIVAR AHORA</button>
                    <button type="button" class="btn btn-red" style="width: auto;" onclick="removerAlerta()" title="Apagar temporizador activo"><i class="fa-solid fa-power-off"></i></button>
                </div>
            </form>
        </div>

        <h2 style="font-family:'Orbitron'; color:white; margin-bottom:15px; font-size:1.2rem;">ESTADO ACTUAL DE LA FLOTA</h2>
        <div id="lista-choferes" class="grid-layout"></div>
    </div>
</div>

<div id="panel-chofer" style="display: none;">
    <div class="chofer-container">
        <div id="chofer-box-alerta" class="form-panel" style="transition: 0.3s;">
            <h1 id="chofer-titulo-estado" style="font-family: 'Orbitron'; margin-bottom: 10px;">NOTIFICACIÓN GENERAL</h1>
            <hr style="border: 0; border-top: 1px dashed rgba(255,255,255,0.2); margin: 15px 0;">
            <p id="chofer-motivo" style="font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; font-weight: 600;"></p>
            
            <div class="timer-box" id="timer-display">00:00:00</div>
            
            <div id="container-img-chofer"></div>
            <p style="font-size: 0.75rem; color: #666; margin-top: 25px; font-style: italic;">Panel de Alertas Integrado - Master Mobility OS</p>
        </div>
    </div>
</div>

<script>
// Configuración de Firebase unificada de tu base de datos actual
const firebaseConfig = {
    apiKey: "AIzaSyB2tSowCQwfncdpjQOYEYOEKLrDaeeap48",
    authDomain: "personal-car-19faa.firebaseapp.com",
    projectId: "personal-car-19faa",
    storageBucket: "personal-car-19faa.firebasestorage.app",
    messagingSenderId: "172539533131",
    appId: "1:172539533131:web:6d56ca847239e989ca7ace"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();
const storage = firebase.storage();

let appData = { conductores: [], vehiculos: [], alertas: {} };
let currentTgConfig = { token: '', chat: '' };
let choferUrlId = new URLSearchParams(window.location.search).get('driver');

// Inicialización de Vistas
window.addEventListener('DOMContentLoaded', () => {
    if (choferUrlId) {
        document.getElementById('panel-chofer').style.display = 'block';
        escucharAlertasChofer(choferUrlId);
    } else {
        document.getElementById('panel-admin').style.display = 'block';
        conectarBaseDatosAdmin();
    }
    // Cargar credenciales del Bot de Telegram registradas en el ERP principal
    db.collection('sistema').doc('config_portal').onSnapshot(doc => {
        if (doc.exists) {
            currentTgConfig.token = doc.data().tgToken || '';
            currentTgConfig.chat = doc.data().tgChat || '';
        }
    });
    // Bucle constante de actualización milimétrica de relojes en pantalla
    setInterval(actualizarRelojesConsistentes, 1000);
});

// Sincronización en tiempo real para el Panel de Administración
function conectarBaseDatosAdmin() {
    // Escucha permanente de Vehículos
    db.collection('vehiculos').onSnapshot(snap => {
        appData.vehiculos = [];
        snap.forEach(doc => appData.vehiculos.push({ id: doc.id, ...doc.data() }));
        renderizarAdminFlota();
    });

    // Escucha permanente de Conductores
    db.collection('conductores').onSnapshot(snap => {
        appData.conductores = [];
        snap.forEach(doc => appData.conductores.push({ id: doc.id, ...doc.data() }));
        
        // Actualizar dropdown selector del formulario
        const select = document.getElementById('select-chofer');
        const selectedValue = select.value;
        select.innerHTML = '<option value="">Seleccione un chofer...</option>' + 
            appData.conductores.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
        if (selectedValue) select.value = selectedValue;

        renderizarAdminFlota();
    });

    // Escucha permanente de las alertas asociadas
    db.collection('alertas_temporizador').onSnapshot(snap => {
        appData.alertas = {};
        snap.forEach(doc => { appData.alertas[doc.id] = doc.data(); });
        renderizarAdminFlota();
        cargarAlertaExistente();
    });
}

function cargarAlertaExistente() {
    const choferId = document.getElementById('select-chofer').value;
    if (!choferId || !appData.alertas[choferId]) {
        if(choferId) document.getElementById('form-alerta').reset();
        document.getElementById('select-chofer').value = choferId;
        return;
    }
    const alerta = appData.alertas[choferId];
    document.getElementById('alerta-motivo').value = alerta.motivo || '';
    document.getElementById('alerta-color').value = alerta.color || 'orange';
}

function renderizarAdminFlota() {
    const contenedor = document.getElementById('lista-choferes');
    if (!contenedor) return;
    contenedor.innerHTML = '';

    if (appData.conductores.length === 0) {
        contenedor.innerHTML = '<p style="color: #666;">No se encontraron conductores registrados en el ERP principal.</p>';
        return;
    }

    appData.conductores.forEach(c => {
        const alerta = appData.alertas[c.id];
        const tieneTimer = alerta && alerta.activo;
        const auto = appData.vehiculos.find(v => v.placa === c.auto_asignado);
        const autoText = auto ? `${auto.modelo} (${auto.placa})` : 'Sin unidad asignada';
        
        let statusBadge = `<span class="badge bg-off"><i class="fa-solid fa-circle"></i> Inactivo</span>`;
        let timerDisplayHtml = '';
        
        if (tieneTimer) {
            statusBadge = `<span class="badge bg-run" style="background:${alerta.color === 'red' ? 'var(--red)' : 'var(--orange)'}"><i class="fa-solid fa-hourglass-start fa-spin"></i> Corriendo</span>`;
            timerDisplayHtml = `<div style="font-family:'Orbitron'; font-size:1.3rem; font-weight:bold; margin-top:10px; color:#fff;" id="admin-timer-${c.id}">Calculando...</div>`;
        }

        // Crear el Link único absoluto para este conductor
        const linkUnico = `${window.location.origin}${window.location.pathname}?driver=${c.id}`;

        contenedor.innerHTML += `
            <div class="driver-card ${tieneTimer ? 'active-timer' : ''}" style="${tieneTimer ? 'border-color:' + (alerta.color === 'red' ? 'var(--red)' : 'var(--orange)') : ''}">
                <div>
                    <h3 style="color: var(--gold); font-size: 1.1rem;">${c.nombre}</h3>
                    <p style="font-size:0.8rem; color:#aaa; margin-top:3px;"><i class="fa-solid fa-car"></i> ${autoText}</p>
                    <p style="font-size:0.8rem; color:#aaa;"><i class="fa-solid fa-phone"></i> ${c.telefono || 'Sin celular'}</p>
                    ${statusBadge}
                    ${timerDisplayHtml}
                </div>
                <div style="margin-top:15px;">
                    <div class="link-box">
                        <span>Link Único</span>
                        <button class="copy-btn" onclick="copiarLink('${linkUnico}')" title="Copiar enlace rápido"><i class="fa-regular fa-copy"></i> Copiar</button>
                    </div>
                    <button class="btn btn-blue" style="padding:8px; font-size:0.7rem; margin-top:10px; font-family:'Inter'; font-weight:600;" onclick="seleccionarChoferForm('${c.id}')"><i class="fa-solid fa-sliders"></i> Configurar Alerta</button>
                </div>
            </div>
        `;
    });
}

function seleccionarChoferForm(id) {
    document.getElementById('select-chofer').value = id;
    cargarAlertaExistente();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function activarAlerta(e) {
    e.preventDefault();
    const choferId = document.getElementById('select-chofer').value;
    if(!choferId) return alert("Selecciona un conductor válido.");

    const btn = document.getElementById('btn-submit-alerta');
    btn.disabled = true;
    btn.innerText = "PROCESANDO ENLACE...";

    const chofer = appData.conductores.find(c => c.id === choferId);
    const motivo = document.getElementById('alerta-motivo').value;
    const color = document.getElementById('alerta-color').value;
    const tiempoVal = parseInt(document.getElementById('alerta-tiempo').value);
    const unidad = document.getElementById('alerta-unidad').value;

    let minutos = unidad === 'horas' ? tiempoVal * 60 : tiempoVal;
    
    // Tiempos absolutos desde el momento de guardado (Admin)
    const ahora = Date.now();
    const expiracion = ahora + (minutos * 60 * 1000);

    try {
        let imageUrl = '';
        const fileInput = document.getElementById('alerta-foto');
        if (fileInput.files.length > 0) {
            const f = fileInput.files[0];
            const ref = storage.ref(`alertas_imagenes/${Date.now()}_${f.name.replace(/[^a-zA-Z0-9.]/g,'')}`);
            await ref.put(f);
            imageUrl = await ref.getDownloadURL();
        } else if (appData.alertas[choferId] && appData.alertas[choferId].foto) {
            imageUrl = appData.alertas[choferId].foto; // Conservar anterior si ya existía
        }

        await db.collection('alertas_temporizador').doc(choferId).set({
            choferId: choferId,
            choferNombre: chofer.nombre,
            motivo: motivo,
            color: color,
            foto: imageUrl,
            createdAt: ahora,
            expiresAt: expiracion,
            notifiedTelegram: false,
            activo: true
        });

        // Alerta inmediata a tu Telegram de que acabas de activarlo
        enviarNotificacionTelegram(`⏳ *TEMPORIZADOR ACTIVADO*\nConductor: ${chofer.nombre}\nMotivo: ${motivo}\nTiempo asignado: ${tiempoVal} ${unidad}.\nEl reloj ya está corriendo.`);

        alert("¡Temporizador en marcha y corriendo de forma absoluta!");
        document.getElementById('alerta-foto').value = '';
    } catch(err) {
        alert("Error al activar: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-bolt"></i> ACTIVAR AHORA';
    }
}

async function removerAlerta() {
    const choferId = document.getElementById('select-chofer').value;
    if (!choferId) return alert("Selecciona un conductor para apagar su alerta.");
    if (!confirm("¿Deseas dar de baja y remover el temporizador de este conductor?")) return;

    try {
        if(appData.alertas[choferId] && appData.alertas[choferId].foto) {
            // Eliminar imagen del storage para optimizar almacenamiento
            try { await storage.refFromURL(appData.alertas[choferId].foto).delete(); } catch(e){}
        }
        await db.collection('alertas_temporizador').doc(choferId).delete();
        document.getElementById('form-alerta').reset();
        alert("Alerta desactivada.");
    } catch(e) { alert(e.message); }
}

// Lógica de Renderizado y Monitoreo de Chofer Individual
let alertaChoferLocal = null;
function escucharAlertasChofer(id) {
    db.collection('alertas_temporizador').doc(id).onSnapshot(doc => {
        const caja = document.getElementById('chofer-box-alerta');
        if (!doc.exists || !doc.data().activo) {
            alertaChoferLocal = null;
            document.getElementById('chofer-titulo-estado').innerText = "SIN ALERTAS ACTIVAS";
            document.getElementById('chofer-motivo').innerText = "Tu cuenta no registra advertencias pendientes de solución en este momento. Sigue conduciendo de forma responsable.";
            document.getElementById('timer-display').innerText = "00:00:00";
            document.getElementById('timer-display').style.color = "var(--success)";
            caja.style.borderColor = "#222";
            document.getElementById('container-img-chofer').innerHTML = '';
            return;
        }

        const data = doc.data();
        alertaChoferLocal = data;
        
        document.getElementById('chofer-titulo-estado').innerText = data.color === 'red' ? "⚠️ ALERTA CRÍTICA DE EMPRESA" : "🚨 ADVERTENCIA TEMPORIZADA";
        document.getElementById('chofer-motivo').innerText = data.motivo;
        
        const colorVar = data.color === 'red' ? 'var(--red)' : 'var(--orange)';
        caja.style.borderColor = colorVar;
        document.getElementById('chofer-titulo-estado').style.color = colorVar;
        document.getElementById('timer-display').style.color = colorVar;

        if (data.foto) {
            document.getElementById('container-img-chofer').innerHTML = `<img src="${data.foto}" class="img-alerta" onclick="window.open('${data.foto}')">`;
        } else {
            document.getElementById('container-img-chofer').innerHTML = '';
        }
        
        actualizarRelojesConsistentes();
    });
}

// Función centralizada encargada de restar el tiempo exacto sin desfases
function actualizarRelojesConsistentes() {
    const ahora = Date.now();

    // 1. Si estamos en vista Chofer
    if (choferUrlId && alertaChoferLocal) {
        const restante = alertaChoferLocal.expiresAt - ahora;
        if (restante <= 0) {
            document.getElementById('timer-display').innerText = "00:00:00";
            evaluarExpiracionServidor(alertaChoferLocal.choferId, alertaChoferLocal);
        } else {
            document.getElementById('timer-display').innerText = formatearMs(restante);
        }
    }

    // 2. Si estamos en vista Administrador, actualizar contadores de las tarjetas en vivo
    if (!choferUrlId && appData.conductores.length > 0) {
        appData.conductores.forEach(c => {
            const alerta = appData.alertas[c.id];
            if (alerta && alerta.activo) {
                const el = document.getElementById(`admin-timer-${c.id}`);
                if (el) {
                    const restante = alerta.expiresAt - ahora;
                    if (restante <= 0) {
                        el.innerText = "TIEMPO AGOTADO";
                        el.style.color = "var(--red)";
                        evaluarExpiracionServidor(c.id, alerta);
                    } else {
                        el.innerText = formatearMs(restante);
                        el.style.color = "white";
                    }
                }
            }
        });
    }
}

// Disparador único blindado para evitar envíos duplicados a Telegram
async function evaluarExpiracionServidor(id, alerta) {
    if (alerta.notifiedTelegram === false) {
        // Bloquear localmente de inmediato para evitar bucles concurrentes
        alerta.notifiedTelegram = true; 
        try {
            await db.collection('alertas_temporizador').doc(id).update({ notifiedTelegram: true });
            enviarNotificacionTelegram(`🚨 *¡TIEMPO AGOTADO!*\nEl temporizador del conductor *${alerta.choferNombre}* ha llegado estrictamente a 0.\nMotivo asignado: ${alerta.motivo}`);
        } catch(e) { console.log(e); }
    }
}

function formatearMs(ms) {
    let segundos = Math.floor(ms / 1000);
    let minutos = Math.floor(segundos / 60);
    let horas = Math.floor(minutos / 60);
    
    segundos = segundos % 60;
    minutos = minutos % 60;
    
    return String(horas).padStart(2, '0') + ':' + String(minutos).padStart(2, '0') + ':' + String(segundos).padStart(2, '0');
}

function enviarNotificacionTelegram(msg) {
    if (currentTgConfig.token && currentTgConfig.chat) {
        fetch(`https://api.telegram.org/bot${currentTgConfig.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: currentTgConfig.chat, text: msg, parse_mode: 'Markdown' })
        }).catch(e => console.log("Fallo envío Telegram: ", e));
    }
}

function copiarLink(txt) {
    navigator.clipboard.writeText(txt).then(() => {
        alert("Enlace único copiado al portapapeles de tu celular. Ya puedes enviárselo por WhatsApp.");
    }).catch(() => { alert("Enlace: " + txt); });
}
</script>
</body>
</html>
